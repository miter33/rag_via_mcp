name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(gh *)" --model claude-haiku-4-5-20251001'
          allowed_bots: 'claude'
          prompt: |
            Follow the instructions in .claude/CLAUDE.md before doing anything.

            Review the pull request ${{ github.repository }}/pull/${{ github.event.pull_request.number }} and post inline comments on specific lines.

            Steps:
            1. Get the latest commit SHA:
               `gh pr view ${{ github.event.pull_request.number }} --json headRefOid --jq '.headRefOid'`

            2. Check if a review already exists for this exact commit:
               `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews --jq '[.[] | select(.user.login == "claude[bot]" and .commit_id == "<SHA from step 1>")] | length'`
               If the result is greater than 0, a review already exists for this commit - stop and do nothing.

            3. Get the diff:
               `gh pr diff ${{ github.event.pull_request.number }}`

            4. Analyze the diff for bugs, security vulnerabilities, and significant code quality issues. For each issue note the exact file path and line number in the file.

            5. Post a PR review with inline comments using the GitHub API:
               gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews -X POST -f commit_id="<SHA>" -f event="COMMENT" -f body="Code review summary" -f "comments[][path]=<file>" -F "comments[][line]=<line>" -f "comments[][body]=<issue>"
               Add one entry per issue found. Use the actual line number in the file (not the diff position).

            Focus on real issues only. Skip style nitpicks.
