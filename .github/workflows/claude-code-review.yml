name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(gh *)"'
          prompt: |
            Review the pull request ${{ github.repository }}/pull/${{ github.event.pull_request.number }}.

            Steps:
            1. Get the diff: `gh pr diff ${{ github.event.pull_request.number }}`
            2. Analyze it for bugs, security vulnerabilities, and significant code quality issues.
            3. Post your findings as a single PR comment using:
               `gh pr comment ${{ github.event.pull_request.number }} --body "..."`

            Keep the review concise and actionable. Focus on real issues, not style nitpicks.
