name: Claude Test Generation

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate-tests:
    if: github.triggering_actor != 'claude[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate tests with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(gh *),Bash(git *),Write,Edit,Read" --model claude-haiku-4-5-20251001'
          show_full_output: true
          prompt: |
            Follow the instructions in .claude/CLAUDE.md before doing anything.

            Look at the diff of PR #${{ github.event.pull_request.number }}:
            `gh pr diff ${{ github.event.pull_request.number }}`

            For every new or modified public class or method in the diff:
            1. Generate xUnit tests covering the main success path and key edge cases
            2. Place tests in the appropriate test project (look for an existing *Tests* or *.Tests* project in the repo)
            3. If no test project exists, create one under `RagDemo.Tests/`
            4. Follow the existing test naming and structure conventions found in the repo

            Write the test files to disk, then commit and push using git:
            - `git config user.email "claude@anthropic.com"`
            - `git config user.name "Claude"`
            - `git add .`
            - `git commit -m "test: generate xUnit tests"`
            - `git push`

            If no new or modified public methods exist in the diff, do nothing.
